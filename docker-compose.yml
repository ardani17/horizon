services:
  db:
    image: postgres:16-alpine
    container_name: horizon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ${DB_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - horizon-net
    expose:
      - "${POSTGRES_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      args:
        BOT_PORT: ${BOT_PORT:-4000}
    container_name: horizon-bot
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BOT_PORT: ${BOT_PORT:-4000}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      TELEGRAM_WEBHOOK_URL: "https://${DOMAIN}/webhook/telegram"
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horizon-net
    ports:
      - "127.0.0.1:${BOT_HOST_PORT:-4888}:${BOT_PORT:-4000}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${BOT_PORT:-4000}/api/bot/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        FRONTEND_PORT: ${FRONTEND_PORT:-3000}
        NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
        NEXT_PUBLIC_SITE_URL: "https://${DOMAIN}"
    container_name: horizon-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${FRONTEND_PORT:-3000}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
      NEXT_PUBLIC_SITE_URL: "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horizon-net
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3888}:${FRONTEND_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${FRONTEND_PORT:-3000}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  horizon-net:
    name: horizon-net
    driver: bridge
