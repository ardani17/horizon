# ============================================
# Horizon Trader Platform — Production (AAPanel)
# 
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# AAPanel reverse proxy:
#   horizon.cloudnexify.com → localhost:3888 (frontend)
#   /api/bot/* dan /webhook/telegram → localhost:4888 (bot)
# ============================================

services:
  db:
    image: postgres:16-alpine
    container_name: horizon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horizon}
      POSTGRES_USER: ${POSTGRES_USER:-horizon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - horizon-net
    # Hanya expose ke localhost, tidak ke public
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horizon_user} -d ${POSTGRES_DB:-horizon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: horizon-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BOT_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-horizon_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-horizon}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID:-0}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-horizon-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horizon-net
    # Expose ke localhost:4888 untuk AAPanel reverse proxy
    ports:
      - "127.0.0.1:4888:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/api/bot/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: horizon-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-horizon_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-horizon}
      NEXT_PUBLIC_BASE_URL: https://horizon.cloudnexify.com
      NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-horizon-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horizon-net
    # Expose ke localhost:3888 untuk AAPanel reverse proxy
    ports:
      - "127.0.0.1:3888:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  pgdata:
    name: horizon-pgdata

networks:
  horizon-net:
    name: horizon-net
    driver: bridge
