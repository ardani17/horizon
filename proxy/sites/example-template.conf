# ============================================================
# Example Site Configuration Template
# ============================================================
#
# HOW TO USE:
#   1. Copy this file:  cp example-template.conf myapp.conf
#   2. Uncomment all lines below (remove the leading "# ")
#   3. Replace every <PLACEHOLDER> with your actual values
#   4. Test the config:  docker exec nginx-proxy nginx -t
#   5. Reload the proxy: bash deploy.sh reload
#
# PLACEHOLDERS TO REPLACE:
#   <DOMAIN>           — Your domain name, e.g. app.example.com
#   <APP_NAME>         — A short name for your app, e.g. myapp
#   <CONTAINER>:<PORT> — Docker container name and port on proxy-net,
#                        e.g. myapp-web:8080
#
# PREREQUISITES:
#   - Your app's docker-compose.yml declares proxy-net as an external network
#   - The app's entry-point service is connected to proxy-net
#   - A Cloudflare Origin Certificate is placed at:
#       /etc/ssl/cloudflare/<DOMAIN>/cert.pem
#       /etc/ssl/cloudflare/<DOMAIN>/key.pem
#
# ============================================================

# ---- Upstream definition ----
# Define the backend service. The server value should be the container name
# (or docker-compose service name) and internal port on proxy-net.
#
# upstream <APP_NAME>-backend {
#     server <CONTAINER>:<PORT>;
# }

# ---- HTTP → HTTPS redirect ----
# Redirects all plain HTTP requests to HTTPS for this domain.
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name <DOMAIN>;
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

