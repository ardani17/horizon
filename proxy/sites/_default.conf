# Default server block — catches requests that don't match any configured domain.
# Returns 444 (close connection) for unknown domains, and provides a /health
# endpoint on port 80 for Docker healthcheck.

# Port 80 default: health check + reject unknown domains
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Health check endpoint for Docker healthcheck
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Close connection for all other requests to unknown domains
    location / {
        return 444;
    }
}

# Port 443 default: reject TLS handshake for unknown domains.
# ssl_reject_handshake (nginx 1.19.4+) closes the connection during the
# TLS handshake without sending a certificate, preventing domain probing.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_reject_handshake on;
}
