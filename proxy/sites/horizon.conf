# Horizon Trader Platform — site configuration
# CHANGE: Replace "horizon.example.com" with your actual domain throughout this file.

# Upstream definitions (container names on proxy-net)
upstream horizon-frontend {
    server horizon-frontend:3000;
}

upstream horizon-bot {
    server horizon-bot:4000;
}

# Redirect HTTP → HTTPS for the Horizon domain
server {
    listen 80;
    listen [::]:80;
    server_name horizon.example.com;  # CHANGE: Replace with your actual domain

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name horizon.example.com;  # CHANGE: Replace with your actual domain

    # SSL certificates (Cloudflare Origin Certificate)
    # CHANGE: Replace "horizon.example.com" with your actual domain in the paths below
    ssl_certificate     /etc/ssl/cloudflare/horizon.example.com/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/horizon.example.com/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # -------------------------------------------------------
    # Bot service routes: /api/bot/* and /webhook/telegram
    # -------------------------------------------------------

    location /api/bot/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://horizon-bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /webhook/telegram {
        limit_req zone=webhook burst=10 nodelay;

        proxy_pass http://horizon-bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Credit API routes: /api/credit/* → frontend
    # -------------------------------------------------------

    location /api/credit/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Admin routes: /admin/* → frontend (protected by app)
    # -------------------------------------------------------

    location /admin {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Static assets: Next.js _next/static with long-term caching
    # -------------------------------------------------------

    location /_next/static/ {
        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets for 1 year (content-hashed by Next.js)
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization endpoint
    location /_next/image {
        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache optimized images for 30 days
        add_header Cache-Control "public, max-age=2592000";
    }

    # Static files (favicon, robots.txt, sitemap, etc.)
    location ~* \.(ico|txt|xml)$ {
        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        add_header Cache-Control "public, max-age=86400";
    }

    # -------------------------------------------------------
    # Default: everything else → frontend
    # -------------------------------------------------------

    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://horizon-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
