# ============================================
# AAPanel Nginx Config untuk horizon.cloudnexify.com
#
# CARA PAKAI:
# 1. Di AAPanel → Website → Add Site → horizon.cloudnexify.com
# 2. Buka site config → Reverse Proxy → Add Reverse Proxy
# 3. Atau paste config ini di site Nginx config
# ============================================

# Paste bagian ini di dalam server {} block di AAPanel site config:

# --- Security Headers ---
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# --- Frontend (semua request default) ---
location / {
    proxy_pass http://127.0.0.1:3888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# --- Bot API routes ---
location /api/bot/ {
    proxy_pass http://127.0.0.1:4888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Telegram Webhook ---
location = /webhook/telegram {
    proxy_pass http://127.0.0.1:4888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Next.js Static Assets (long-term cache) ---
location /_next/static/ {
    proxy_pass http://127.0.0.1:3888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# --- Next.js Image Optimization ---
location /_next/image {
    proxy_pass http://127.0.0.1:3888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
